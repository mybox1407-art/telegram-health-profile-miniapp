<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Анкета</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #f4f4f5;
      --text: #111111;
      --hint: #7a7a7a;
      --field-bg: #ffffff;
      --field-text: #111111;
      --field-placeholder: #8b8b8b;
      --button: #8b5cf6;
      --button-text: #ffffff;
      --border: rgba(0, 0, 0, 0.12);
      --danger: #ef4444;
      --radius: 14px;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      font-weight: 700;
      color: #111111;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--hint);
      font-size: 16px;
    }

    .form-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: 600;
      color: #222222;
    }

    input[type="text"],
    textarea,
    select,
    .custom-select-trigger,
    .custom-select-search {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--field-bg);
      color: var(--field-text);
      font-size: 16px;
      outline: none;
    }

    input[type="text"]::placeholder,
    textarea::placeholder,
    .custom-select-search::placeholder {
      color: var(--field-placeholder);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    input[readonly] {
      opacity: 1;
      background: #f8f8f8;
      color: #222222;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #c061ff;
    }

    .range-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .range-value {
      color: #6b7280;
      font-size: 14px;
      min-width: 70px;
      text-align: right;
    }

    button {
      width: 100%;
      border: none;
      border-radius: var(--radius);
      background: var(--button);
      color: var(--button-text);
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .status {
      margin-top: 14px;
      font-size: 15px;
      color: #6b7280;
    }

    .status.error {
      color: var(--danger);
    }

    .notice {
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: var(--radius);
      background: rgba(255, 196, 0, 0.12);
      color: #9a6700;
      font-size: 14px;
      display: none;
    }

    .custom-select {
      position: relative;
    }

    .custom-select-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      text-align: left;
      background: var(--field-bg);
      color: var(--field-text);
    }

    .custom-select-trigger span {
      pointer-events: none;
    }

    .custom-select-arrow {
      color: #6b7280;
      font-size: 18px;
      margin-left: 10px;
    }

    .custom-select-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      z-index: 1000;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
    }

    .hidden {
      display: none;
    }

    .custom-select-search {
      border: none;
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      background: #ffffff;
      color: #111111;
    }

    .custom-select-options {
      max-height: 240px;
      overflow-y: auto;
      background: #ffffff;
    }

    .custom-select-option {
      padding: 13px 16px;
      font-size: 15px;
      cursor: pointer;
      color: #111111;
      background: #ffffff;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .custom-select-option:last-child {
      border-bottom: none;
    }

    .custom-select-option:hover,
    .custom-select-option.active {
      background: rgba(139, 92, 246, 0.12);
    }

    .custom-select-empty {
      padding: 14px 16px;
      color: #6b7280;
      font-size: 14px;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Анкета</h1>
    <p class="subtitle">Заполните базовую информацию о себе</p>

    <div id="browserNotice" class="notice">
      Приложение открыто вне Telegram. Telegram ID и username могут не определиться.
    </div>

    <form id="profileForm">
      <div class="form-group">
        <label for="user_id">🆔 Telegram ID</label>
        <input type="text" id="user_id" readonly />
      </div>

      <div class="form-group">
        <label for="username">@ Username Telegram</label>
        <input type="text" id="username" readonly />
      </div>

      <div class="form-group">
        <label for="city_search">🌆 Город</label>

        <div class="custom-select" id="citySelect">
          <div class="custom-select-trigger" id="cityTrigger" tabindex="0">
            <span id="cityTriggerText">Выберите город...</span>
            <span class="custom-select-arrow">⌄</span>
          </div>

          <div class="custom-select-dropdown hidden" id="cityDropdown">
            <input
              type="text"
              id="city_search"
              class="custom-select-search"
              placeholder="Начните вводить город..."
              autocomplete="off"
            />
            <div class="custom-select-options" id="cityOptions"></div>
          </div>
        </div>

        <input type="hidden" id="city" required />
      </div>

      <div class="form-group">
        <label for="fullname">👤 Имя</label>
        <input type="text" id="fullname" placeholder="Введите имя" required />
      </div>

      <div class="form-group">
        <label for="gender">⚧ Пол</label>
        <select id="gender" required>
          <option value="">Выберите пол...</option>
          <option value="Мужской">Мужской</option>
          <option value="Женский">Женский</option>
        </select>
      </div>

      <div class="form-group">
        <div class="range-header">
          <label for="age">🎂 Возраст</label>
          <span class="range-value"><span id="age_value">25</span> лет</span>
        </div>
        <input type="range" id="age" min="1" max="100" step="1" value="25" required />
      </div>

      <div class="form-group">
        <div class="range-header">
          <label for="height_cm">📏 Рост</label>
          <span class="range-value"><span id="height_cm_value">170</span> см</span>
        </div>
        <input type="range" id="height_cm" min="30" max="210" step="1" value="170" required />
      </div>

      <div class="form-group">
        <div class="range-header">
          <label for="weight_kg">⚖️ Вес</label>
          <span class="range-value"><span id="weight_kg_value">70</span> кг</span>
        </div>
        <input type="range" id="weight_kg" min="3" max="200" step="0.1" value="70" required />
      </div>

      <div class="form-group">
        <label for="chronic_diseases">🩺 Хронические заболевания</label>
        <textarea id="chronic_diseases" placeholder="Если нет, напишите: Нет" required></textarea>
      </div>

      <div class="form-group">
        <label for="allergies">🚨 Аллергические реакции</label>
        <textarea id="allergies" placeholder="Если нет, напишите: Нет" required></textarea>
      </div>

      <button type="submit" id="submitBtn">Сохранить анкету</button>
      <div id="status" class="status"></div>
    </form>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;

    const GET_CITIES_URL = 'https://n8n.kino-test.ru/webhook/get_cities';
    const GET_PROFILE_URL = 'https://n8n.kino-test.ru/webhook/get-profile';
    const SAVE_PROFILE_URL = 'https://n8n.kino-test.ru/webhook/save-profile';

    const els = {
      browserNotice: document.getElementById('browserNotice'),
      profileForm: document.getElementById('profileForm'),
      submitBtn: document.getElementById('submitBtn'),
      status: document.getElementById('status'),

      user_id: document.getElementById('user_id'),
      username: document.getElementById('username'),
      city: document.getElementById('city'),
      fullname: document.getElementById('fullname'),
      gender: document.getElementById('gender'),
      age: document.getElementById('age'),
      age_value: document.getElementById('age_value'),
      height_cm: document.getElementById('height_cm'),
      height_cm_value: document.getElementById('height_cm_value'),
      weight_kg: document.getElementById('weight_kg'),
      weight_kg_value: document.getElementById('weight_kg_value'),
      chronic_diseases: document.getElementById('chronic_diseases'),
      allergies: document.getElementById('allergies')
    };

    const cityUI = {
      select: document.getElementById('citySelect'),
      trigger: document.getElementById('cityTrigger'),
      triggerText: document.getElementById('cityTriggerText'),
      dropdown: document.getElementById('cityDropdown'),
      search: document.getElementById('city_search'),
      options: document.getElementById('cityOptions'),
      hiddenInput: document.getElementById('city')
    };

    let allCities = [];
    let filteredCities = [];

    function setStatus(message, isError = false) {
      els.status.textContent = message;
      els.status.className = isError ? 'status error' : 'status';
    }

    function bindRangeValues() {
      const updateAge = () => {
        els.age_value.textContent = els.age.value;
      };

      const updateHeight = () => {
        els.height_cm_value.textContent = els.height_cm.value;
      };

      const updateWeight = () => {
        els.weight_kg_value.textContent = Number(els.weight_kg.value).toFixed(1).replace(/\.0$/, '');
      };

      els.age.addEventListener('input', updateAge);
      els.height_cm.addEventListener('input', updateHeight);
      els.weight_kg.addEventListener('input', updateWeight);

      updateAge();
      updateHeight();
      updateWeight();
    }

    function initTelegram() {
      if (!tg) {
        els.browserNotice.style.display = 'block';
        return null;
      }

      tg.ready();
      tg.expand();

      const user = tg.initDataUnsafe?.user;

      if (!user) {
        els.browserNotice.style.display = 'block';
        return null;
      }

      els.user_id.value = user.id ? String(user.id) : '';
      els.username.value = user.username || '';

      return user;
    }

    function openCityDropdown() {
      cityUI.dropdown.classList.remove('hidden');
      cityUI.search.focus();
      cityUI.search.select();
    }

    function closeCityDropdown() {
      cityUI.dropdown.classList.add('hidden');
    }

    function setCity(cityName) {
      cityUI.hiddenInput.value = cityName || '';
      cityUI.triggerText.textContent = cityName || 'Выберите город...';
      cityUI.search.value = cityName || '';
    }

    function renderCityOptions(cities) {
      cityUI.options.innerHTML = '';

      if (!cities.length) {
        cityUI.options.innerHTML = '<div class="custom-select-empty">Ничего не найдено</div>';
        return;
      }

      for (const item of cities) {
        const cityName = item.city_name || item.name || item.city || '';
        if (!cityName) continue;

        const option = document.createElement('div');
        option.className = 'custom-select-option';
        option.textContent = cityName;

        if (cityUI.hiddenInput.value === cityName) {
          option.classList.add('active');
        }

        option.addEventListener('click', () => {
          setCity(cityName);
          closeCityDropdown();
        });

        cityUI.options.appendChild(option);
      }
    }

    function setupCitySearch() {
      cityUI.trigger.addEventListener('click', () => {
        const isHidden = cityUI.dropdown.classList.contains('hidden');

        if (isHidden) {
          filteredCities = allCities;
          renderCityOptions(filteredCities);
          openCityDropdown();
        } else {
          closeCityDropdown();
        }
      });

      cityUI.trigger.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();

          const isHidden = cityUI.dropdown.classList.contains('hidden');
          if (isHidden) {
            filteredCities = allCities;
            renderCityOptions(filteredCities);
            openCityDropdown();
          } else {
            closeCityDropdown();
          }
        }
      });

      cityUI.search.addEventListener('input', () => {
        const query = cityUI.search.value.trim().toLowerCase();

        filteredCities = allCities.filter(item => {
          const cityName = (item.city_name || item.name || item.city || '').toLowerCase();
          return cityName.includes(query);
        });

        renderCityOptions(filteredCities);
      });

      document.addEventListener('click', (e) => {
        if (!cityUI.select.contains(e.target)) {
          closeCityDropdown();
        }
      });
    }

    async function loadCities() {
      const response = await fetch(GET_CITIES_URL, {
        method: 'GET'
      });

      if (!response.ok) {
        throw new Error('Ошибка загрузки городов!');
      }

      const result = await response.json();
      const cities = Array.isArray(result)
        ? result
        : (Array.isArray(result.cities) ? result.cities : []);

      if (!cities.length) {
        throw new Error('Список городов пуст!');
      }

      allCities = cities;
      filteredCities = cities;
      renderCityOptions(allCities);
    }

    function applyProfile(profile) {
      if (!profile || typeof profile !== 'object') {
        return;
      }

      if (profile.city) setCity(profile.city);
      if (profile.fullname) els.fullname.value = profile.fullname;
      if (profile.gender) els.gender.value = profile.gender;

      if (profile.age !== null && profile.age !== undefined && profile.age !== '') {
        els.age.value = Number(profile.age);
      }

      if (profile.height_cm !== null && profile.height_cm !== undefined && profile.height_cm !== '') {
        els.height_cm.value = Number(profile.height_cm);
      }

      if (profile.weight_kg !== null && profile.weight_kg !== undefined && profile.weight_kg !== '') {
        els.weight_kg.value = Number(profile.weight_kg);
      }

      if (profile.chronic_diseases) els.chronic_diseases.value = profile.chronic_diseases;
      if (profile.allergies) els.allergies.value = profile.allergies;

      els.age.dispatchEvent(new Event('input'));
      els.height_cm.dispatchEvent(new Event('input'));
      els.weight_kg.dispatchEvent(new Event('input'));
    }

    async function loadProfile(userId) {
      try {
        setStatus('Загружаем данные анкеты...');

        const response = await fetch(GET_PROFILE_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            telegram_id: userId
          })
        });

        if (!response.ok) {
          throw new Error('Ошибка загрузки анкеты');
        }

        const result = await response.json();

        if (!result || result.found !== true || !result.profile) {
          setStatus('');
          return;
        }

        applyProfile(result.profile);
        setStatus('');
      } catch (error) {
        console.error(error);
        setStatus('Не удалось загрузить анкету из базы!', true);
      }
    }

    function buildPayload() {
      return {
        user_id: els.user_id.value ? Number(els.user_id.value) : null,
        username: els.username.value.trim(),
        city: cityUI.hiddenInput.value,
        fullname: els.fullname.value.trim(),
        gender: els.gender.value,
        age: Number(els.age.value),
        height_cm: Number(els.height_cm.value),
        weight_kg: Number(els.weight_kg.value),
        chronic_diseases: els.chronic_diseases.value.trim(),
        allergies: els.allergies.value.trim()
      };
    }

    function validatePayload(payload) {
      if (!payload.user_id) return 'Не удалось определить Telegram ID. Откройте форму из Telegram.';
      if (!payload.username) return 'Не удалось определить username Telegram.';
      if (!payload.city) return 'Выберите город.';
      if (!payload.fullname) return 'Введите имя.';
      if (!payload.gender) return 'Выберите пол.';
      if (!payload.age) return 'Укажите возраст.';
      if (!payload.chronic_diseases) return 'Заполните поле "Хронические заболевания".';
      if (!payload.allergies) return 'Заполните поле "Аллергические реакции".';
      return '';
    }

    els.profileForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const payload = buildPayload();
      const errorMessage = validatePayload(payload);

      if (errorMessage) {
        setStatus(errorMessage, true);
        return;
      }

      try {
        els.submitBtn.disabled = true;
        setStatus('Сохраняем анкету...');

        const response = await fetch(SAVE_PROFILE_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error('Ошибка при сохранении анкеты');
        }

        setStatus('Анкета успешно сохранена!');
      } catch (error) {
        console.error(error);
        setStatus('Не удалось сохранить анкету!', true);
      } finally {
        els.submitBtn.disabled = false;
      }
    });

    async function initApp() {
      bindRangeValues();
      setupCitySearch();

      const user = initTelegram();

      try {
        setStatus('Загружаем города...');
        await loadCities();
      } catch (error) {
        console.error(error);
        cityUI.triggerText.textContent = 'Не удалось загрузить города!';
        setStatus('Не удалось загрузить список городов!', true);
        return;
      }

      if (user?.id) {
        await loadProfile(user.id);
      } else {
        setStatus('');
      }
    }

    initApp();
  </script>
</body>
</html>
